<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // === React & ReactDOM dari global ===
        const { useState, useEffect, useRef, useCallback, createElement } = React;
        const { createRoot } = ReactDOM;
        
        // === Import Three.js dari module ===
        import * as THREE from 'three';
        
        // === Helper: cn untuk conditional className ===
        function cn(...classes) { return classes.filter(Boolean).join(' '); }
        
        // === Custom Hooks ===
        function useAI() {
            const callAI = useCallback(async (prompt, systemMsg = "Anda asisten profesional.") => {
                const provider = document.getElementById('globalProvider')?.value || 'pollinations';
                let apiKey = document.getElementById('globalApiKey')?.value.trim() || '';
                if ((provider === 'groq' || provider === 'gemini') && !apiKey) {
                    throw new Error(`API Key untuk ${provider} diperlukan`);
                }
                const messages = [
                    { role: 'system', content: systemMsg },
                    { role: 'user', content: prompt }
                ];
                if (provider === 'pollinations') {
                    const res = await fetch('https://text.pollinations.ai/', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messages, model: 'openai' })
                    });
                    return await res.text();
                } else if (provider === 'githubmodels') {
                    const res = await fetch('https://js.puter.com/v2/chat/completions', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ model: 'gpt-3.5-turbo', messages })
                    });
                    const data = await res.json();
                    return data.choices[0].message.content;
                } else if (provider === 'groq') {
                    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                        body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages })
                    });
                    const data = await res.json();
                    return data.choices[0].message.content;
                } else if (provider === 'gemini') {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${apiKey}`;
                    const res = await fetch(url, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await res.json();
                    return data.candidates[0].content.parts[0].text;
                }
                throw new Error('Provider tidak dikenal');
            }, []);
            return { callAI };
        }
        
        // === Three.js Background Component ===
        function ThreeBackground() {
            const mountRef = useRef(null);
            useEffect(() => {
                if (!mountRef.current) return;
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 3;
                const renderer = new THREE.WebGLRenderer({ alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setClearColor(0x000000, 0);
                mountRef.current.appendChild(renderer.domElement);
                
                const geometry = new THREE.SphereGeometry(1.2, 64, 64);
                const material = new THREE.MeshStandardMaterial({ color: 0x3b82f6, wireframe: true, emissive: 0x1e40af });
                const sphere = new THREE.Mesh(geometry, material);
                scene.add(sphere);
                
                const starsGeometry = new THREE.BufferGeometry();
                const starsCount = 2000;
                const starsPositions = new Float32Array(starsCount * 3);
                for (let i = 0; i < starsCount; i++) {
                    starsPositions[i*3] = (Math.random() - 0.5) * 200;
                    starsPositions[i*3+1] = (Math.random() - 0.5) * 100;
                    starsPositions[i*3+2] = (Math.random() - 0.5) * 50 - 20;
                }
                starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
                const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2 });
                const stars = new THREE.Points(starsGeometry, starsMaterial);
                scene.add(stars);
                
                const ambientLight = new THREE.AmbientLight(0x404040);
                scene.add(ambientLight);
                const pointLight = new THREE.PointLight(0xffffff, 1);
                pointLight.position.set(5, 5, 5);
                scene.add(pointLight);
                
                let time = 0;
                function animate() {
                    requestAnimationFrame(animate);
                    time += 0.005;
                    sphere.rotation.x = time * 0.5;
                    sphere.rotation.y = time * 0.3;
                    stars.rotation.y = time * 0.05;
                    renderer.render(scene, camera);
                }
                animate();
                
                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);
                return () => {
                    window.removeEventListener('resize', handleResize);
                    if (mountRef.current) mountRef.current.removeChild(renderer.domElement);
                    renderer.dispose();
                };
            }, []);
            return createElement('div', { ref: mountRef, className: 'fixed inset-0 -z-10' });
        }
        
        // === History Drawer ===
        function HistoryDrawer({ open, onClose }) {
            const [history, setHistory] = useState([]);
            useEffect(() => {
                const stored = localStorage.getItem('aiHistory');
                if (stored) setHistory(JSON.parse(stored));
                const handleStorage = () => {
                    const newStored = localStorage.getItem('aiHistory');
                    if (newStored) setHistory(JSON.parse(newStored));
                };
                window.addEventListener('storage', handleStorage);
                return () => window.removeEventListener('storage', handleStorage);
            }, []);
            if (!open) return null;
            return createElement('div', { className: 'fixed inset-0 z-50 flex justify-end' },
                createElement('div', { className: 'absolute inset-0 bg-black/50', onClick: onClose }),
                createElement('div', { className: 'relative w-80 h-full bg-white dark:bg-gray-800 shadow-xl p-4 overflow-y-auto' },
                    createElement('div', { className: 'flex justify-between items-center mb-4' },
                        createElement('h2', { className: 'text-lg font-bold' }, '📜 Riwayat'),
                        createElement('button', { onClick: onClose, className: 'p-1 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700' }, '✖️')
                    ),
                    history.length === 0 && createElement('p', { className: 'text-sm text-gray-500' }, 'Belum ada riwayat'),
                    history.map((item, idx) => createElement('div', { key: idx, className: 'p-2 mb-2 rounded-md bg-gray-100 dark:bg-gray-700 text-sm cursor-pointer hover:bg-gray-200', onClick: () => {
                        if (item.type === 'Rewriter') {
                            document.getElementById('sourceSentence').value = item.input;
                            if (item.output) {
                                document.getElementById('outputInd').innerText = item.output.indonesia || '';
                                document.getElementById('outputEng').innerText = item.output.inggris || '';
                                document.getElementById('outputMay').innerText = item.output.melayu || '';
                            }
                        } else if (item.type === 'Fintech') {
                            document.getElementById('fintechInput').value = item.input;
                            document.getElementById('fintechOutput').innerText = item.output;
                        }
                        onClose();
                    } },
                        createElement('div', { className: 'font-semibold' }, item.type),
                        createElement('div', { className: 'text-xs truncate' }, item.input)
                    ))
                )
            );
        }
        
        // === Toast Context Sederhana ===
        let toastId = 0;
        function ToastContainer() {
            const [toasts, setToasts] = useState([]);
            useEffect(() => {
                window.showToast = (message, type = 'info') => {
                    const id = toastId++;
                    setToasts(prev => [...prev, { id, message, type }]);
                    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
                };
            }, []);
            return createElement('div', { className: 'fixed bottom-4 right-4 z-50 flex flex-col gap-2' },
                toasts.map(toast => createElement('div', { key: toast.id, className: cn('toast px-4 py-2 rounded-lg shadow-lg text-white text-sm', toast.type === 'error' ? 'bg-red-500' : 'bg-gray-800 dark:bg-gray-700') }, toast.message))
            );
        }
        
        // === Rewriter Tab ===
        function RewriterTab() {
            const [text, setText] = useState('Dengan adanya inovasi teknologi, kita harus beradaptasi secara cepat agar tidak tertinggal dari kompetitor global.');
            const [psycho, setPsycho] = useState(false);
            const [loading, setLoading] = useState(false);
            const [output, setOutput] = useState({ indonesia: '—', inggris: '—', melayu: '—' });
            const { callAI } = useAI();
            
            const handleRewrite = async () => {
                if (!text.trim()) { window.showToast('Masukkan kalimat', 'error'); return; }
                setLoading(true);
                const prompt = `Rangkai ulang kalimat ke 3 bahasa: Indonesia, Inggris, Melayu Malaysia. Setiap diawali "Pengguna yang terhormat," diakhiri "terima kasih." Gaya formal, profesional. ${psycho ? 'Gunakan psikologi (sugesti, persuasi, framing).' : ''} Kalimat: "${text}". Output JSON: {"indonesia":"...","inggris":"...","melayu":"..."}`;
                try {
                    const res = await callAI(prompt, "Output hanya JSON valid.");
                    const match = res.match(/\{[\s\S]*\}/);
                    if (!match) throw new Error('Bukan JSON');
                    const data = JSON.parse(match[0]);
                    setOutput(data);
                    const history = JSON.parse(localStorage.getItem('aiHistory') || '[]');
                    history.unshift({ type: 'Rewriter', input: text, output: data, timestamp: Date.now() });
                    localStorage.setItem('aiHistory', JSON.stringify(history.slice(0, 20)));
                    window.showToast('Berhasil dirangkai');
                } catch (err) {
                    window.showToast(err.message, 'error');
                } finally { setLoading(false); }
            };
            
            const copyText = (txt) => { navigator.clipboard.writeText(txt); window.showToast('Tersalin'); };
            const downloadTxt = () => {
                const content = `INDONESIA:\n${output.indonesia}\n\nENGLISH:\n${output.inggris}\n\nMELAYU:\n${output.melayu}`;
                const blob = new Blob([content], { type: 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'rewriter_result.txt';
                a.click();
                URL.revokeObjectURL(a.href);
            };
            
            return createElement('div', { className: 'space-y-6' },
                createElement('div', { className: 'relative' },
                    createElement('textarea', { id: 'sourceSentence', value: text, onChange: (e) => setText(e.target.value), rows: 3, className: 'w-full p-4 rounded-xl border bg-white dark:bg-gray-800 resize-none focus:ring-2 focus:ring-blue-500' }),
                    createElement('button', { className: 'absolute bottom-3 right-3 p-2 rounded-full bg-blue-500 text-white', onClick: () => {
                        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                        if (SpeechRecognition) {
                            const recognition = new SpeechRecognition();
                            recognition.lang = 'id-ID';
                            recognition.onresult = (e) => setText(text + e.results[0][0].transcript);
                            recognition.start();
                        } else window.showToast('Voice tidak didukung', 'error');
                    } }, '🎤')
                ),
                createElement('div', { className: 'flex flex-wrap gap-4 justify-between items-center' },
                    createElement('label', { className: 'flex items-center gap-2' }, createElement('input', { type: 'checkbox', checked: psycho, onChange: (e) => setPsycho(e.target.checked) }), ' 🧠 Mode Psikologi'),
                    createElement('button', { onClick: handleRewrite, disabled: loading, className: 'px-6 py-2 bg-blue-600 text-white rounded-full font-semibold disabled:opacity-50' }, loading ? 'Memproses...' : '✨ Rangkai Ulang')
                ),
                createElement('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-4' },
                    Object.entries(output).map(([lang, val]) => createElement('div', { key: lang, className: 'p-4 rounded-xl bg-white dark:bg-gray-800 shadow-sm' },
                        createElement('div', { className: 'flex justify-between items-center mb-2' },
                            createElement('span', { className: 'font-bold' }, lang === 'indonesia' ? '🇮🇩 Indonesia' : lang === 'inggris' ? '🇬🇧 English' : '🇲🇾 Melayu'),
                            createElement('button', { onClick: () => copyText(val), className: 'p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-700' }, '📋')
                        ),
                        createElement('div', { className: 'text-sm whitespace-pre-wrap' }, val)
                    ))
                ),
                createElement('div', { className: 'flex justify-end' },
                    createElement('button', { onClick: downloadTxt, className: 'flex items-center gap-2 px-4 py-2 rounded-full border' }, '💾 Download TXT')
                )
            );
        }
        
        // === Fintech Tab ===
        function FintechTab() {
            const [input, setInput] = useState('BCA an. Ahmad Fauzi no rek 1234567890123456');
            const [output, setOutput] = useState('');
            const [loading, setLoading] = useState(false);
            const { callAI } = useAI();
            
            const formatRule = (raw) => {
                let cleaned = raw.replace(/[•\-–—*_]/g, ' ').replace(/\s+/g, ' ').trim();
                let accountNumber = (cleaned.match(/\b(\d{8,20})\b/) || [])[1] || 'Tidak ditemukan';
                let bankMatch = cleaned.match(/(bank\s+(\w+)|bca|mandiri|bri|bni|cimb|danamon|permata|maybank|muamalat|bsi|btn)/i);
                let bankName = bankMatch ? bankMatch[0].replace(/^bank\s+/i,'') : 'Tidak terdeteksi';
                bankName = bankName.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ');
                let nameMatch = cleaned.match(/(a\/n|a\.n|an\.|atas nama)[\s:]+([A-Za-z\s\.]+?)(?=\s*(?:no|rek|$|\d))/i);
                let accountName = nameMatch ? nameMatch[2].trim().split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ') : 'Tidak terdeteksi';
                return `BANK NAME: ${bankName}\nACCOUNT NAME: ${accountName}\nACCOUNT NUMBER: ${accountNumber}`;
            };
            
            const handleRule = () => setOutput(formatRule(input));
            const handleAI = async () => {
                if (!input.trim()) return;
                setLoading(true);
                const prompt = `Ekstrak info perbankan: BANK NAME, ACCOUNT NAME, ACCOUNT NUMBER. Output tiga baris sesuai format. Teks: "${input}"`;
                try {
                    const res = await callAI(prompt);
                    const lines = res.split('\n').slice(0,3).join('\n');
                    setOutput(lines);
                    const history = JSON.parse(localStorage.getItem('aiHistory') || '[]');
                    history.unshift({ type: 'Fintech', input, output: lines, timestamp: Date.now() });
                    localStorage.setItem('aiHistory', JSON.stringify(history.slice(0, 20)));
                    window.showToast('AI selesai');
                } catch (err) {
                    setOutput(formatRule(input));
                    window.showToast(err.message, 'error');
                } finally { setLoading(false); }
            };
            const copy = () => { navigator.clipboard.writeText(output); window.showToast('Tersalin'); };
            const download = () => {
                const blob = new Blob([output], {type: 'text/plain'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'fintech_result.txt';
                a.click();
                URL.revokeObjectURL(a.href);
            };
            const triggerDetect = (t) => /\b(bank|rekening|account|no rekening|a\/n)\b/i.test(t) || /\b\d{8,20}\b/.test(t);
            
            return createElement('div', { className: 'space-y-6' },
                createElement('textarea', { id: 'fintechInput', value: input, onChange: (e) => setInput(e.target.value), rows: 4, className: 'w-full p-4 rounded-xl border bg-white dark:bg-gray-800' }),
                createElement('div', { className: 'flex gap-3' },
                    createElement('button', { onClick: handleRule, className: 'px-4 py-2 rounded-full bg-gray-500 text-white' }, '🔍 Rule (Cepat)'),
                    createElement('button', { onClick: handleAI, disabled: loading, className: 'px-4 py-2 rounded-full bg-blue-600 text-white' }, loading ? 'Memproses...' : '🧠 AI (Pintar)')
                ),
                createElement('div', { className: 'text-sm' }, createElement('span', { className: cn('inline-block px-2 py-1 rounded-full', triggerDetect(input) ? 'bg-green-100 text-green-800' : 'bg-gray-100') }, triggerDetect(input) ? '✅ Trigger terdeteksi' : '🔍 Tidak terdeteksi')),
                createElement('div', { id: 'fintechOutput', className: 'p-4 rounded-xl bg-white dark:bg-gray-800 shadow-sm whitespace-pre-wrap font-mono' }, output || 'Hasil akan muncul di sini'),
                createElement('div', { className: 'flex gap-3 justify-end' },
                    createElement('button', { onClick: copy, className: 'flex items-center gap-1 px-3 py-1 rounded-full border' }, '📋 Copy'),
                    createElement('button', { onClick: download, className: 'flex items-center gap-1 px-3 py-1 rounded-full border' }, '💾 Download')
                )
            );
        }
        
        // === Surat Tab ===
        function SuratTab() {

            return createElement('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-6' },
                createElement('div', { className: 'space-y-4' },
                    createElement('div', null, createElement('label', { className: 'block font-bold mb-1' }, 'Logo'), createElement('input', { type: 'file', accept: 'image/*', onChange: handleLogoUpload, className: 'w-full' })),
                    createElement('div', null, createElement('label', { className: 'block font-bold mb-1' }, 'Jenis Surat'), createElement('select', { className: 'w-full p-2 rounded border', defaultValue: '#3b82f6', onChange: (e) => document.documentElement.style.setProperty('--primary-color', e.target.value) }, 
                        createElement('option', { value: '#3b82f6' }, 'Pemberitahuan (Biru)'),
                        createElement('option', { value: '#003366' }, 'Perintah (Navy)'),
                        createElement('option', { value: '#28a745' }, 'Tugas (Hijau)'),

                    createElement('div', null, createElement('label', { className: 'block font-bold mb-1' }, 'Judul'), createElement('input', { value: judul, onChange: (e) => setJudul(e.target.value), className: 'w-full p-2 rounded border' })),

        // === Main App ===
        function App() {
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('darkMode') === 'true');
            const [historyOpen, setHistoryOpen] = useState(false);
            const [activeTab, setActiveTab] = useState('rewriter');
            
            useEffect(() => {
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                localStorage.setItem('darkMode', darkMode);
            }, [darkMode]);
            
            const tabs = [
                { id: 'rewriter', label: '✍️ Sentence Rewriter', component: RewriterTab },
                { id: 'fintech', label: '🏦 Fintech Formatter', component: FintechTab },
                { id: 'surat', label: '📄 Surat Otomatis', component: SuratTab }
            ];
            
            return createElement('div', { className: 'relative min-h-screen' },

                createElement('div', { className: 'relative z-10 container mx-auto px-4 py-6' },
                    createElement('div', { className: 'flex justify-between items-center mb-6' },

                        createElement('div', { className: 'flex gap-3' },
                            createElement('button', { onClick: () => setHistoryOpen(true), className: 'p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800' }, '📜'),

                    createElement('div', { className: 'mb-6 p-4 bg-white dark:bg-gray-800 rounded-xl shadow-sm' },

                            createElement('select', { id: 'globalProvider', className: 'px-3 py-2 rounded-md border bg-white dark:bg-gray-700' },
                                createElement('option', { value: 'pollinations' }, 'Pollinations AI (Gratis)'),
                                createElement('option', { value: 'githubmodels' }, 'GitHub Models (Gratis)'),
                                createElement('option', { value: 'groq' }, 'Groq (Llama 3.3)'),
                                createElement('option', { value: 'gemini' }, 'Google Gemini')
                            ),
                            createElement('input', { type: 'password', id: 'globalApiKey', placeholder: 'API Key (jika perlu)', className: 'px-3 py-2 rounded-md border bg-white dark:bg-gray-700' })

                    createElement('div', { className: 'flex gap-2 border-b mb-6' },

                            onClick: () => setActiveTab(tab.id),
                            className: cn('px-4 py-2 font-semibold rounded-t-lg transition', activeTab === tab.id ? 'bg-blue-600 text-white' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800')
                        }, tab.label))

                    createElement('div', { className: 'bg-white dark:bg-gray-800 rounded-xl shadow p-6' },

                        activeTab === 'fintech' && createElement(FintechTab, null),
                        activeTab === 'surat' && createElement(SuratTab, null)
                    ),
                    createElement(HistoryDrawer, { open: historyOpen, onClose: () => setHistoryOpen(false) }),
                    createElement(ToastContainer, null)
                )
            );
        }
        
        // Render
        const root = createRoot(document.getElementById('root'));
        root.render(createElement(App, null));
    </script>
