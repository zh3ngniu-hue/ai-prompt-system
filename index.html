<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI Suite Pro · Dewa Kalimat · Bendahara Jahanam · Surat Alam Semesta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@11.0.2/dist/framer-motion.js"></script>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.164.1/build/three.module.js" } }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-track { background: #2d2d2d; }
        .toast { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .letter-preview { transition: all 0.2s; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; top: 0; left: 0; width: 100%; margin: 0; padding: 20mm; }
            .no-print { display: none; }

</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef, useCallback, createElement } = React;
        const { createRoot } = ReactDOM;
        import * as THREE from 'three';
        
        function cn(...classes) { return classes.filter(Boolean).join(' '); }
        
        // ========== AI HOOK ==========
        function useAI() {
            const callAI = useCallback(async (prompt, systemMsg = "Anda asisten profesional.") => {
                const provider = document.getElementById('globalProvider')?.value || 'pollinations';
                let apiKey = document.getElementById('globalApiKey')?.value.trim() || '';
                if ((provider === 'groq' || provider === 'gemini') && !apiKey) {
                    throw new Error(`API Key untuk ${provider} diperlukan`);
                }
                const messages = [{ role: 'system', content: systemMsg }, { role: 'user', content: prompt }];
                if (provider === 'pollinations') {
                    const res = await fetch('https://text.pollinations.ai/', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messages, model: 'openai' })
                    });
                    if (!res.ok) throw new Error(`Pollinations error: ${res.status}`);
                    return await res.text();
                } else if (provider === 'groq') {
                    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                        body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error?.message || `Groq error: ${res.status}`);
                    return data.choices[0].message.content;
                } else if (provider === 'gemini') {
                    // Gunakan model yang lebih stabil
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                    const res = await fetch(url, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error?.message || `Gemini error: ${res.status}`);
                    if (!data.candidates || data.candidates.length === 0) throw new Error('Tidak ada respons dari Gemini');
                    return data.candidates[0].content.parts[0].text;
                }
                throw new Error('Provider tidak dikenal');
            }, []);
            return { callAI };
        }
        
        // ========== THREE BACKGROUND ==========
        function ThreeBackground() {
            const mountRef = useRef(null);
            useEffect(() => {
                if (!mountRef.current) return;
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 3;
                const renderer = new THREE.WebGLRenderer({ alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setClearColor(0x000000, 0);
                mountRef.current.appendChild(renderer.domElement);
                const geometry = new THREE.SphereGeometry(1.2, 64, 64);
                const material = new THREE.MeshStandardMaterial({ color: 0x3b82f6, wireframe: true, emissive: 0x1e40af });
                const sphere = new THREE.Mesh(geometry, material);
                scene.add(sphere);
                const starsGeometry = new THREE.BufferGeometry();
                const starsCount = 2000;
                const starsPositions = new Float32Array(starsCount * 3);
                for (let i = 0; i < starsCount; i++) {
                    starsPositions[i*3] = (Math.random() - 0.5) * 200;
                    starsPositions[i*3+1] = (Math.random() - 0.5) * 100;
                    starsPositions[i*3+2] = (Math.random() - 0.5) * 50 - 20;
                }
                starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
                const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2 });
                const stars = new THREE.Points(starsGeometry, starsMaterial);
                scene.add(stars);
                const ambientLight = new THREE.AmbientLight(0x404040);
                scene.add(ambientLight);
                const pointLight = new THREE.PointLight(0xffffff, 1);
                pointLight.position.set(5, 5, 5);
                scene.add(pointLight);
                let time = 0;
                function animate() {
                    requestAnimationFrame(animate);
                    time += 0.005;
                    sphere.rotation.x = time * 0.5;
                    sphere.rotation.y = time * 0.3;
                    stars.rotation.y = time * 0.05;
                    renderer.render(scene, camera);
                }
                animate();
                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);
                return () => {
                    window.removeEventListener('resize', handleResize);
                    if (mountRef.current) mountRef.current.removeChild(renderer.domElement);
                    renderer.dispose();
                };
            }, []);
            return createElement('div', { ref: mountRef, className: 'fixed inset-0 -z-10' });
        }
        
        // ========== HISTORY DRAWER ==========
        function HistoryDrawer({ open, onClose }) {
            const [history, setHistory] = useState([]);
            useEffect(() => {
                const stored = localStorage.getItem('aiHistory');
                if (stored) setHistory(JSON.parse(stored));
                const handleStorage = () => {
                    const newStored = localStorage.getItem('aiHistory');
                    if (newStored) setHistory(JSON.parse(newStored));
                };
                window.addEventListener('storage', handleStorage);
                return () => window.removeEventListener('storage', handleStorage);
            }, []);
            if (!open) return null;
            return createElement('div', { className: 'fixed inset-0 z-50 flex justify-end' },
                createElement('div', { className: 'absolute inset-0 bg-black/50', onClick: onClose }),
                createElement('div', { className: 'relative w-80 h-full bg-white dark:bg-gray-800 shadow-xl p-4 overflow-y-auto' },
                    createElement('div', { className: 'flex justify-between items-center mb-4' },
                        createElement('h2', { className: 'text-lg font-bold' }, '📜 Riwayat'),
                        createElement('button', { onClick: onClose, className: 'p-1 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700' }, '✖️')
                    ),
                    history.length === 0 && createElement('p', { className: 'text-sm text-gray-500' }, 'Belum ada riwayat'),
                    history.map((item, idx) => createElement('div', { key: idx, className: 'p-2 mb-2 rounded-md bg-gray-100 dark:bg-gray-700 text-sm cursor-pointer hover:bg-gray-200', onClick: () => {
                        if (item.type === 'Rewriter') {
                            document.getElementById('sourceSentence').value = item.input;
                            if (item.output) {
                                document.getElementById('outputInd').innerText = item.output.indonesia || '';
                                document.getElementById('outputEng').innerText = item.output.inggris || '';
                                document.getElementById('outputMay').innerText = item.output.melayu || '';
                            }
                        } else if (item.type === 'Fintech') {
                            document.getElementById('fintechInput').value = item.input;
                            document.getElementById('fintechOutput').innerText = item.output;
                        }
                        onClose();
                    } },
                        createElement('div', { className: 'font-semibold' }, item.type),
                        createElement('div', { className: 'text-xs truncate' }, item.input)
                    ))
                )
            );
        }
        
        // ========== TOAST ==========
        let toastId = 0;
        function ToastContainer() {
            const [toasts, setToasts] = useState([]);
            useEffect(() => {
                window.showToast = (message, type = 'info') => {
                    const id = toastId++;
                    setToasts(prev => [...prev, { id, message, type }]);
                    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
                };
            }, []);
            return createElement('div', { className: 'fixed bottom-4 right-4 z-50 flex flex-col gap-2' },
                toasts.map(toast => createElement('div', { key: toast.id, className: cn('toast px-4 py-2 rounded-lg shadow-lg text-white text-sm', toast.type === 'error' ? 'bg-red-500' : 'bg-gray-800 dark:bg-gray-700') }, toast.message))
            );
        }
        
        // ========== REWRITER TAB ==========
        function RewriterTab() {
            const [text, setText] = useState('Dengan adanya inovasi teknologi, kita harus beradaptasi secara cepat agar tidak tertinggal dari kompetitor global.');
            const [psycho, setPsycho] = useState(false);
            const [loading, setLoading] = useState(false);
            const [output, setOutput] = useState({ indonesia: '—', inggris: '—', melayu: '—' });
            const { callAI } = useAI();
            
            const handleRewrite = async () => {
                if (!text.trim()) { window.showToast('Masukkan kalimat', 'error'); return; }
                setLoading(true);
                const prompt = `Rangkai ulang kalimat ke 3 bahasa: Indonesia, Inggris, Melayu Malaysia. Setiap diawali "Pengguna yang terhormat," diakhiri "terima kasih." Gaya formal, profesional. ${psycho ? 'Gunakan psikologi (sugesti, persuasi, framing).' : ''} Kalimat: "${text}". Output JSON: {"indonesia":"...","inggris":"...","melayu":"..."}`;
                try {
                    const res = await callAI(prompt, "Output hanya JSON valid.");
                    const match = res.match(/\{[\s\S]*\}/);
                    if (!match) throw new Error('Bukan JSON');
                    const data = JSON.parse(match[0]);
                    setOutput(data);
                    const history = JSON.parse(localStorage.getItem('aiHistory') || '[]');
                    history.unshift({ type: 'Rewriter', input: text, output: data, timestamp: Date.now() });
                    localStorage.setItem('aiHistory', JSON.stringify(history.slice(0, 20)));
                    window.showToast('Berhasil dirangkai');
                } catch (err) {
                    window.showToast(err.message, 'error');
                } finally { setLoading(false); }
            };
            
            const copyText = (txt) => { navigator.clipboard.writeText(txt); window.showToast('Tersalin'); };
            const downloadTxt = () => {
                const content = `INDONESIA:\n${output.indonesia}\n\nENGLISH:\n${output.inggris}\n\nMELAYU:\n${output.melayu}`;
                const blob = new Blob([content], { type: 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'rewriter_result.txt';
                a.click();
                URL.revokeObjectURL(a.href);
            };
            
            return createElement('div', { className: 'space-y-6' },
                createElement('div', { className: 'relative' },
                    createElement('textarea', { id: 'sourceSentence', value: text, onChange: (e) => setText(e.target.value), rows: 3, className: 'w-full p-4 rounded-xl border bg-white dark:bg-gray-800 resize-none focus:ring-2 focus:ring-blue-500' }),
                    createElement('button', { className: 'absolute bottom-3 right-3 p-2 rounded-full bg-blue-500 text-white', onClick: () => {
                        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                        if (SpeechRecognition) {
                            const recognition = new SpeechRecognition();
                            recognition.lang = 'id-ID';
                            recognition.onresult = (e) => setText(text + e.results[0][0].transcript);
                            recognition.start();
                        } else window.showToast('Voice tidak didukung', 'error');
                    } }, '🎤')
                ),
                createElement('div', { className: 'flex flex-wrap gap-4 justify-between items-center' },
                    createElement('label', { className: 'flex items-center gap-2' }, createElement('input', { type: 'checkbox', checked: psycho, onChange: (e) => setPsycho(e.target.checked) }), ' 🧠 Mode Psikologi'),
                    createElement('button', { onClick: handleRewrite, disabled: loading, className: 'px-6 py-2 bg-blue-600 text-white rounded-full font-semibold disabled:opacity-50' }, loading ? 'Memproses...' : '✨ Rangkai Ulang')
                ),
                createElement('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-4' },
                    Object.entries(output).map(([lang, val]) => createElement('div', { key: lang, className: 'p-4 rounded-xl bg-white dark:bg-gray-800 shadow-sm' },
                        createElement('div', { className: 'flex justify-between items-center mb-2' },
                            createElement('span', { className: 'font-bold' }, lang === 'indonesia' ? '🇮🇩 Indonesia' : lang === 'inggris' ? '🇬🇧 English' : '🇲🇾 Melayu'),
                            createElement('button', { onClick: () => copyText(val), className: 'p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-700' }, '📋')
                        ),
                        createElement('div', { className: 'text-sm whitespace-pre-wrap' }, val)
                    ))
                ),
                createElement('div', { className: 'flex justify-end' },
                    createElement('button', { onClick: downloadTxt, className: 'flex items-center gap-2 px-4 py-2 rounded-full border' }, '💾 Download TXT')
                )
            );
        }
        
        // ========== FINTECH TAB ==========
        function FintechTab() {
            const [input, setInput] = useState('BCA an. Ahmad Fauzi no rek 1234567890123456');
            const [output, setOutput] = useState('');
            const [loading, setLoading] = useState(false);
            const { callAI } = useAI();
            
            const formatRule = (raw) => {
                let cleaned = raw.replace(/[•\-–—*_]/g, ' ').replace(/\s+/g, ' ').trim();
                let accountNumber = (cleaned.match(/\b(\d{8,20})\b/) || [])[1] || 'Tidak ditemukan';
                let bankMatch = cleaned.match(/(bank\s+(\w+)|bca|mandiri|bri|bni|cimb|danamon|permata|maybank|muamalat|bsi|btn)/i);
                let bankName = bankMatch ? bankMatch[0].replace(/^bank\s+/i,'') : 'Tidak terdeteksi';
                bankName = bankName.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ');
                let nameMatch = cleaned.match(/(a\/n|a\.n|an\.|atas nama)[\s:]+([A-Za-z\s\.]+?)(?=\s*(?:no|rek|$|\d))/i);
                let accountName = nameMatch ? nameMatch[2].trim().split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ') : 'Tidak terdeteksi';
                return `BANK NAME: ${bankName}\nACCOUNT NAME: ${accountName}\nACCOUNT NUMBER: ${accountNumber}`;
            };
            
            const handleAI = async () => {
                if (!input.trim()) { window.showToast('Masukkan teks', 'error'); return; }
                setLoading(true);
                const prompt = `Ekstrak informasi perbankan dari teks berikut. Output hanya tiga baris: BANK NAME: [nama bank], ACCOUNT NAME: [nama pemilik], ACCOUNT NUMBER: [nomor rekening]. Jangan tambahkan teks lain. Teks: "${input}"`;
                try {
                    const res = await callAI(prompt, "Anda adalah ekstraktor data perbankan yang akurat.");
                    const lines = res.split('\n').slice(0,3).join('\n');
                    setOutput(lines);
                    const history = JSON.parse(localStorage.getItem('aiHistory') || '[]');
                    history.unshift({ type: 'Fintech', input, output: lines, timestamp: Date.now() });
                    localStorage.setItem('aiHistory', JSON.stringify(history.slice(0, 20)));
                    window.showToast('Ekstraksi AI selesai');
                } catch (err) {
                    setOutput(formatRule(input));
                    window.showToast(err.message, 'error');
                } finally { setLoading(false); }
            };
            
            const copyToClipboard = () => {
                if (!output) { window.showToast('Tidak ada teks', 'error'); return; }
                navigator.clipboard.writeText(output);
                window.showToast('Tersalin ke clipboard');
            };
            
            return createElement('div', { className: 'space-y-6' },
                createElement('textarea', { id: 'fintechInput', value: input, onChange: (e) => setInput(e.target.value), rows: 4, className: 'w-full p-4 rounded-xl border bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500' }),
                createElement('div', { className: 'flex gap-3 justify-end' },
                    createElement('button', { onClick: handleAI, disabled: loading, className: 'px-6 py-2 rounded-full bg-blue-600 text-white font-semibold disabled:opacity-50 hover:bg-blue-700' }, loading ? 'Memproses...' : '🧠 AI (Pintar)'),
                    createElement('button', { onClick: copyToClipboard, className: 'px-6 py-2 rounded-full bg-gray-600 text-white font-semibold hover:bg-gray-700' }, '📋 Copy')
                ),
                createElement('div', { id: 'fintechOutput', className: 'p-4 rounded-xl bg-white dark:bg-gray-800 shadow-inner whitespace-pre-wrap font-mono text-sm border' }, output || 'Hasil ekstraksi akan muncul di sini')
            );
        }
        
        // ========== SURAT TAB ==========
        function SuratTab() {
            const { callAI } = useAI();
            
            const [docTitle, setDocTitle] = useState('SURAT PEMBERITAHUAN KEPATUHAN');
            const [docRef, setDocRef] = useState('AMTK-COMPLIANCE-2026-0427-178');
            const [docDate, setDocDate] = useState('27 April 2026');
            const [recipient, setRecipient] = useState('Ahmad Zaheri bin Harun\nNo. Rekening : 112018017807\nBank : Maybank');
            const [subject, setSubject] = useState('Pemberitahuan Kepatuhan Penarikan Dana Internasional');
            const [paragraphs, setParagraphs] = useState([
                'Dengan hormat,',
                'Sehubungan dengan pengajuan penarikan dana bernilai besar, bersama ini kami sampaikan bahwa transaksi Anda memasuki prosedur kepatuhan dan peninjauan keamanan sesuai standar transaksi lintas negara.'
            ]);
            const [tableData, setTableData] = useState({
                headers: ['Nama Pemilik Akun', 'No. Rekening', 'Bank Tujuan', 'Jenis Transaksi', 'Nilai Penarikan', 'Kewajiban (3%)'],
                rows: [['Ahmad Zaheri bin Harun', '112018017807', 'Maybank', 'Penarikan Dana Internasional', 'Rp3.319.715.482', 'Rp99.591.464']]
            });
            const [signature, setSignature] = useState('Divisi Kepatuhan & Manajemen Risiko\nAlliance Mall TK');
            const [footer, setFooter] = useState('COMPLIANCE & TRUST | YOUR SECURITY IS OUR PRIORITY');
            
            const themes = {
                modernBlue: { name: 'Modern Biru', bg: 'white', text: '#1e293b', accent: '#2563eb', accentBg: '#dbeafe', border: '#bfdbfe', tableHeader: '#2563eb', tableHeaderText: 'white', tableRowEven: '#f8fafc' },
                freshGreen: { name: 'Hijau Segar', bg: '#f0fdf4', text: '#14532d', accent: '#16a34a', accentBg: '#dcfce7', border: '#bbf7d0', tableHeader: '#15803d', tableHeaderText: 'white', tableRowEven: '#f0fdf4' },
                elegantGray: { name: 'Abu-abu Elegan', bg: '#f9fafb', text: '#111827', accent: '#4b5563', accentBg: '#f3f4f6', border: '#e5e7eb', tableHeader: '#374151', tableHeaderText: 'white', tableRowEven: '#f9fafb' },
                creamClassic: { name: 'Krem Klasik', bg: '#fffbeb', text: '#78350f', accent: '#d97706', accentBg: '#fef3c7', border: '#fde68a', tableHeader: '#b45309', tableHeaderText: 'white', tableRowEven: '#fffbeb' },
                maroonLuxury: { name: 'Marun Mewah', bg: '#fff1f2', text: '#881337', accent: '#e11d48', accentBg: '#ffe4e6', border: '#fecdd3', tableHeader: '#be123c', tableHeaderText: 'white', tableRowEven: '#fff1f2' },
                goldBlack: { name: 'Hitam Emas', bg: '#1c1917', text: '#fef08a', accent: '#eab308', accentBg: '#292524', border: '#713f12', tableHeader: '#facc15', tableHeaderText: '#1c1917', tableRowEven: '#292524' },
                purpleModern: { name: 'Ungu Muda', bg: '#faf5ff', text: '#4c1d95', accent: '#8b5cf6', accentBg: '#ede9fe', border: '#ddd6fe', tableHeader: '#7c3aed', tableHeaderText: 'white', tableRowEven: '#faf5ff' }
            };
            const [currentTheme, setCurrentTheme] = useState('modernBlue');
            const theme = themes[currentTheme];
            
            const [generatePrompt, setGeneratePrompt] = useState('');
            const [generating, setGenerating] = useState(false);
            
            const generateLetterFromPrompt = async () => {
                if (!generatePrompt.trim()) { window.showToast('Masukkan deskripsi surat', 'error'); return; }
                setGenerating(true);
                const systemMsg = `Anda adalah pembuat surat profesional. Output dalam format JSON:
{
  "title": "judul surat",
  "ref": "nomor referensi",
  "date": "tanggal",
  "recipient": "nama dan alamat penerima (bisa multi-baris)",
  "subject": "perihal",
  "paragraphs": ["paragraf1", "paragraf2", ...],
  "tableHeaders": ["kolom1", "kolom2", ...],
  "tableRows": [["data1", "data2", ...], ...],
  "signature": "tanda tangan dan jabatan",
  "footer": "kaki surat"
}
Gunakan data yang sesuai. Buat surat yang profesional dan sesuai permintaan: ${generatePrompt}`;
                try {
                    const res = await callAI(systemMsg, "Output hanya JSON valid.");
                    const match = res.match(/\{[\s\S]*\}/);
                    if (!match) throw new Error('Respon bukan JSON');
                    const data = JSON.parse(match[0]);
                    setDocTitle(data.title || 'SURAT');
                    setDocRef(data.ref || 'REF-' + Date.now());
                    setDocDate(data.date || new Date().toLocaleDateString('id-ID'));
                    setRecipient(data.recipient || '');
                    setSubject(data.subject || '');
                    if (data.paragraphs) setParagraphs(data.paragraphs);
                    if (data.tableHeaders && data.tableRows) setTableData({ headers: data.tableHeaders, rows: data.tableRows });
                    if (data.signature) setSignature(data.signature);
                    if (data.footer) setFooter(data.footer);
                    window.showToast('Surat berhasil digenerate');
                } catch (err) {
                    window.showToast('Gagal generate: ' + err.message, 'error');
                } finally { setGenerating(false); }
            };
            
            const addTableRow = () => {
                const newRow = tableData.headers.map(() => '');
                setTableData(prev => ({ ...prev, rows: [...prev.rows, newRow] }));
            };
            const removeTableRow = (idx) => {
                setTableData(prev => ({ ...prev, rows: prev.rows.filter((_, i) => i !== idx) }));
            };
            const updateTableRow = (rowIdx, colIdx, value) => {
                const newRows = [...tableData.rows];
                newRows[rowIdx][colIdx] = value;
                setTableData(prev => ({ ...prev, rows: newRows }));
            };
            const addTableColumn = () => {
                const newHeader = `Kolom ${tableData.headers.length + 1}`;
                setTableData(prev => ({
                    headers: [...prev.headers, newHeader],
                    rows: prev.rows.map(row => [...row, ''])
                }));
            };
            const updateTableHeader = (colIdx, value) => {
                const newHeaders = [...tableData.headers];
                newHeaders[colIdx] = value;
                setTableData(prev => ({ ...prev, headers: newHeaders }));
            };
            
            const optimizeLetterStyle = async () => {
                const fullContent = `Judul: ${docTitle}\nPerihal: ${subject}\nIsi: ${paragraphs.join(' ')}`;
                const prompt = `Perbaiki tata bahasa dan gaya surat berikut menjadi lebih profesional dan formal. Jangan ubah data penting. Output dalam format JSON sama seperti generate: {"title":"...","ref":"...","date":"...","recipient":"...","subject":"...","paragraphs":[...],"tableHeaders":[...],"tableRows":[...],"signature":"...","footer":"..."}`;
                try {
                    const res = await callAI(prompt + "\n\n" + fullContent);
                    const match = res.match(/\{[\s\S]*\}/);
                    if (match) {
                        const data = JSON.parse(match[0]);
                        if (data.title) setDocTitle(data.title);
                        if (data.ref) setDocRef(data.ref);
                        if (data.date) setDocDate(data.date);
                        if (data.recipient) setRecipient(data.recipient);
                        if (data.subject) setSubject(data.subject);
                        if (data.paragraphs) setParagraphs(data.paragraphs);
                        if (data.tableHeaders && data.tableRows) setTableData({ headers: data.tableHeaders, rows: data.tableRows });
                        if (data.signature) setSignature(data.signature);
                        if (data.footer) setFooter(data.footer);
                        window.showToast('Gaya surat dioptimasi');
                    }
                } catch (err) {
                    window.showToast('Optimasi gagal', 'error');
                }
            };
            
            const handlePrint = () => {
                const printContent = document.getElementById('print-area').cloneNode(true);
                const style = document.createElement('style');
                style.textContent = `
                    body { margin: 0; padding: 0; background: white; }
                    .letter-print { max-width: 210mm; margin: 0 auto; background: ${theme.bg}; color: ${theme.text}; padding: 15mm; }
                    .header-print { border-bottom: 2px solid ${theme.accent}; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; }
                    .table-print { width: 100%; border-collapse: collapse; margin: 15px 0; }
                    .table-print th, .table-print td { border: 1px solid ${theme.border}; padding: 8px; text-align: left; }
                    .table-print th { background: ${theme.tableHeader}; color: ${theme.tableHeaderText}; }
                    .signature-print { margin-top: 30px; text-align: right; white-space: pre-wrap; }
                    .footer-print { margin-top: 20px; text-align: center; font-size: 10px; border-top: 1px solid ${theme.border}; padding-top: 8px; }
                `;
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`
                    <html><head><title>Cetak Surat</title>${style.outerHTML}</head><body>
                    <div class="letter-print">${printContent.innerHTML}</div>
                    </body></html>
                `);
                printWindow.document.close();
                printWindow.print();
            };
            
            const LetterPreview = () => (
                <div id="print-area" className="letter-preview" style={{ background: theme.bg, color: theme.text, borderRadius: '12px', padding: '15px', boxShadow: '0 4px 12px rgba(0,0,0,0.1)' }}>
                    <div className="header-print" style={{ borderBottom: `2px solid ${theme.accent}`, paddingBottom: '10px', marginBottom: '20px', display: 'flex', justifyContent: 'space-between' }}>
                        <div><strong>ALLIANCE MALL TK</strong><br /><span style={{ fontSize: '12px' }}>GLOBAL COMMERCE PLATFORM</span></div>
                        <div style={{ textAlign: 'right' }}>No. {docRef}<br />Tanggal: {docDate}</div>
                    </div>
                    <div className="title-doc" style={{ fontSize: '18px', fontWeight: 'bold', textTransform: 'uppercase', textAlign: 'center' }}>{docTitle}</div>
                    {recipient && <div style={{ margin: '15px 0', whiteSpace: 'pre-wrap' }}>Kepada Yth.<br />{recipient}</div>}
                    {subject && <div style={{ fontWeight: 'bold', margin: '10px 0' }}>Perihal: {subject}</div>}
                    {paragraphs.map((p, idx) => <p key={idx} style={{ margin: '8px 0', lineHeight: '1.5' }}>{p}</p>)}
                    {tableData.headers.length > 0 && (
                        <table className="table-print" style={{ width: '100%', borderCollapse: 'collapse', margin: '15px 0' }}>
                            <thead><tr>{tableData.headers.map((h, i) => <th key={i} style={{ border: `1px solid ${theme.border}`, padding: '8px', background: theme.tableHeader, color: theme.tableHeaderText }}>{h}</th>)}</thead>
                            <tbody>
                                {tableData.rows.map((row, ri) => (
                                    <tr key={ri}>{row.map((cell, ci) => <td key={ci} style={{ border: `1px solid ${theme.border}`, padding: '8px', background: ri % 2 === 0 ? theme.bg : theme.tableRowEven }}>{cell}</td>)}</tr>
                                ))}
                            </tbody>
                        </table>
                    )}
                    <div className="signature-print" style={{ marginTop: '30px', textAlign: 'right', whiteSpace: 'pre-wrap' }}>{signature}</div>
                    <div className="footer-print" style={{ marginTop: '20px', textAlign: 'center', fontSize: '10px', borderTop: `1px solid ${theme.border}`, paddingTop: '8px' }}>{footer}</div>
                </div>
            );
            
            return createElement('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-6' },
                createElement('div', { className: 'space-y-4 form-container', style: { color: '#000' } },
                    createElement('div', null,
                        createElement('label', { className: 'block font-bold mb-1' }, '🎨 Gaya Surat'),
                        createElement('select', { value: currentTheme, onChange: (e) => setCurrentTheme(e.target.value), className: 'w-full p-2 rounded border text-black bg-white' },
                            Object.keys(themes).map(key => createElement('option', { key, value: key }, themes[key].name))
                        )
                    ),
                    createElement('div', null,
                        createElement('label', { className: 'block font-bold mb-1' }, '✨ Generate Surat dari Deskripsi'),
                        createElement('div', { className: 'flex gap-2' },
                            createElement('input', { value: generatePrompt, onChange: (e) => setGeneratePrompt(e.target.value), placeholder: 'Contoh: buat surat peringatan keterlambatan pembayaran dengan tabel rincian tagihan', className: 'flex-1 p-2 rounded border text-black bg-white' }),
                            createElement('button', { onClick: generateLetterFromPrompt, disabled: generating, className: 'px-4 py-2 bg-purple-600 text-white rounded-full' }, generating ? 'Memproses...' : '✨ Generate dengan AI')
                        )
                    ),
                    createElement('hr'),
                    createElement('div', null, createElement('label', { className: 'block font-bold mb-1' }, 'Judul'), createElement('input', { value: docTitle, onChange: (e) => setDocTitle(e.target.value), className: 'w-full p-2 rounded border text-black bg-white' })),
                    createElement('div', null, createElement('label', { className: 'block font-bold mb-1' }, 'No. Referensi'), createElement('input', { value: docRef, onChange: (e) => setDocRef(e.target.value), className: 'w-full p-2 rounded border text-black bg-white' })),
                    createElement('div', null, createElement('label', { className: 'block font-bold mb-1' }, 'Tanggal'), createElement('input', { value: docDate, onChange: (e) => setDocDate(e.target.value), className: 'w-full p-2 rounded border text-black bg-white' })),
                    createElement('div', null, createElement('label', { className: 'block font-bold mb-1' }, 'Penerima'), createElement('textarea', { value: recipient, onChange: (e) => setRecipient(e.target.value), rows: 3, className: 'w-full p-2 rounded border text-black bg-white' })),
                    createElement('div', null, createElement('label', { className: 'block font-bold mb-1' }, 'Perihal'), createElement('input', { value: subject, onChange: (e) => setSubject(e.target.value), className: 'w-full p-2 rounded border text-black bg-white' })),
                    createElement('div', null, createElement('label', { className: 'block font-bold mb-1' }, 'Paragraf (pisahkan dengan baris kosong)'), createElement('textarea', { value: paragraphs.join('\n\n'), onChange: (e) => setParagraphs(e.target.value.split('\n\n')), rows: 5, className: 'w-full p-2 rounded border text-black bg-white font-mono' })),
                    createElement('div', null,
                        createElement('label', { className: 'block font-bold mb-1' }, 'Tabel Dinamis'),
                        createElement('div', { className: 'overflow-x-auto' },
                            createElement('table', { className: 'w-full border-collapse' },
                                createElement('thead', null,
                                    createElement('tr', null,
                                        tableData.headers.map((h, i) => createElement('th', { key: i, className: 'border p-1 bg-gray-100' }, createElement('input', { value: h, onChange: (e) => updateTableHeader(i, e.target.value), className: 'w-full min-w-[80px] p-1 text-black bg-white' }))),
                                        createElement('th', { className: 'border p-1' }, createElement('button', { onClick: addTableColumn, className: 'text-blue-500' }, '+ Kolom'))
                                    )
                                ),
                                createElement('tbody', null,
                                    tableData.rows.map((row, ri) => createElement('tr', { key: ri },
                                        row.map((cell, ci) => createElement('td', { key: ci, className: 'border p-1' }, createElement('input', { value: cell, onChange: (e) => updateTableRow(ri, ci, e.target.value), className: 'w-full p-1 text-black bg-white' }))),
                                        createElement('td', { className: 'border p-1 text-center' }, createElement('button', { onClick: () => removeTableRow(ri), className: 'text-red-500' }, '🗑️'))
                                    ))
                                )
                            )
                        ),
                        createElement('button', { onClick: addTableRow, className: 'mt-2 px-3 py-1 bg-gray-200 rounded-full text-sm' }, '+ Baris')
                    ),
                    createElement('div', null, createElement('label', { className: 'block font-bold mb-1' }, 'Tanda Tangan'), createElement('textarea', { value: signature, onChange: (e) => setSignature(e.target.value), rows: 2, className: 'w-full p-2 rounded border text-black bg-white' })),
                    createElement('div', null, createElement('label', { className: 'block font-bold mb-1' }, 'Footer'), createElement('input', { value: footer, onChange: (e) => setFooter(e.target.value), className: 'w-full p-2 rounded border text-black bg-white' })),
                    createElement('div', { className: 'flex gap-3' },
                        createElement('button', { onClick: optimizeLetterStyle, className: 'px-4 py-2 bg-blue-600 text-white rounded-full' }, '✨ Optimasi Gaya dengan AI'),
                        createElement('button', { onClick: handlePrint, className: 'px-4 py-2 bg-gray-800 text-white rounded-full' }, '🖨️ Cetak / PDF')
                    )
                ),
                createElement('div', { className: 'overflow-auto p-2 bg-gray-100 dark:bg-gray-800 rounded-xl' },
                    createElement(LetterPreview, null)
                )
            );
        }
        
        // ========== MAIN APP (dengan Verifikasi API Key) ==========
        function App() {
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('darkMode') === 'true');
            const [historyOpen, setHistoryOpen] = useState(false);
            const [activeTab, setActiveTab] = useState('rewriter');
            const [verifying, setVerifying] = useState(false);
            
            useEffect(() => {
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                localStorage.setItem('darkMode', darkMode);
            }, [darkMode]);
            
            const verifyApiKey = async () => {
                const provider = document.getElementById('globalProvider')?.value;
                let apiKey = document.getElementById('globalApiKey')?.value.trim();
                if (!apiKey) {
                    window.showToast('Masukkan API Key terlebih dahulu', 'error');
                    return;
                }
                if (provider !== 'groq' && provider !== 'gemini') {
                    window.showToast('Verifikasi hanya untuk Groq atau Gemini', 'error');
                    return;
                }
                setVerifying(true);
                try {
                    let testPrompt = "Balas dengan kata 'OK' saja.";
                    if (provider === 'gemini') {
                        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                        const res = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: testPrompt }] }] })
                        });
                        const data = await res.json();
                        if (!res.ok) throw new Error(data.error?.message || 'Koneksi gagal');
                        if (!data.candidates || data.candidates.length === 0) throw new Error('Tidak ada respons');
                        window.showToast('✅ API Key Gemini valid!', 'info');
                    } else if (provider === 'groq') {
                        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                            body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: [{ role: 'user', content: testPrompt }] })
                        });
                        const data = await res.json();
                        if (!res.ok) throw new Error(data.error?.message || 'Koneksi gagal');
                        window.showToast('✅ API Key Groq valid!', 'info');
                    }
                } catch (err) {
                    window.showToast(`❌ Verifikasi gagal: ${err.message}`, 'error');
                } finally {
                    setVerifying(false);
                }
            };
            
            const tabs = [
                { id: 'rewriter', label: '✍️ Penyulap Kalimat Level Dewa', component: RewriterTab },
                { id: 'fintech', label: '🏦 Bendahara online jahanam', component: FintechTab },
                { id: 'surat', label: '📨 Surat dari Alam Semesta', component: SuratTab }
            ];
            
            return createElement('div', { className: 'relative min-h-screen' },
                createElement(ThreeBackground, null),
                createElement('div', { className: 'relative z-10 container mx-auto px-4 py-6' },
                    createElement('div', { className: 'flex justify-between items-center mb-6' },
                        createElement('h1', { className: 'text-3xl font-bold bg-gradient-to-r from-blue-600 to-green-500 bg-clip-text text-transparent' }, 'AI Suite Pro'),
                        createElement('div', { className: 'flex gap-3' },
                            createElement('button', { onClick: () => setHistoryOpen(true), className: 'p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800' }, '📜'),
                            createElement('button', { onClick: () => setDarkMode(!darkMode), className: 'p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800' }, darkMode ? '☀️' : '🌙')
                        )
                    ),
                    createElement('div', { className: 'mb-6 p-4 bg-white dark:bg-gray-800 rounded-xl shadow-sm' },
                        createElement('div', { className: 'flex flex-wrap items-center gap-4' },
                            createElement('span', { className: 'font-semibold' }, '🤖 AI Engine:'),
                            createElement('select', { id: 'globalProvider', className: 'px-3 py-2 rounded-md border bg-white dark:bg-gray-700' },
                                createElement('option', { value: 'pollinations' }, 'Pollinations AI (Gratis, Stabil)'),
                                createElement('option', { value: 'groq' }, 'Groq (Llama 3.3) - butuh API key'),
                                createElement('option', { value: 'gemini' }, 'Google Gemini - butuh API key')
                            ),
                            createElement('input', { type: 'password', id: 'globalApiKey', placeholder: 'API Key (jika perlu)', className: 'px-3 py-2 rounded-md border bg-white dark:bg-gray-700' }),
                            createElement('button', { onClick: verifyApiKey, disabled: verifying, className: 'px-3 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 disabled:opacity-50' }, verifying ? 'Memverifikasi...' : '🔑 Verifikasi')
                        )
                    ),
                    createElement('div', { className: 'flex gap-2 border-b mb-6' },
                        tabs.map(tab => createElement('button', {
                            key: tab.id,
                            onClick: () => setActiveTab(tab.id),
                            className: cn('px-4 py-2 font-semibold rounded-t-lg transition', activeTab === tab.id ? 'bg-blue-600 text-white' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800')
                        }, tab.label))
                    ),
                    createElement('div', { className: 'bg-white dark:bg-gray-800 rounded-xl shadow p-6' },
                        activeTab === 'rewriter' && createElement(RewriterTab, null),
                        activeTab === 'fintech' && createElement(FintechTab, null),
                        activeTab === 'surat' && createElement(SuratTab, null)
                    ),
                    createElement(HistoryDrawer, { open: historyOpen, onClose: () => setHistoryOpen(false) }),
                    createElement(ToastContainer, null)
                )
            );
        }
        
        const root = createRoot(document.getElementById('root'));
        root.render(createElement(App, null));
    </script>
</body>
